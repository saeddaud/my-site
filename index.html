<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Totally Normal Website</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    text-align: center;
}

/* NORMAL SCREEN */
#normal {
    margin-top: 150px;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    cursor: pointer;
}

/* SCARE SCREEN */
#scare {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    color: red;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    animation: shake 0.2s infinite;
}

#scare img {
    width: 300px;
}

/* SHAKE EFFECT */
@keyframes shake {
    0% { transform: translate(2px, 2px); }
    25% { transform: translate(-2px, -2px); }
    50% { transform: translate(2px, -2px); }
    75% { transform: translate(-2px, 2px); }
    100% { transform: translate(2px, 2px); }
}
</style>
</head>

<body>

<!-- NORMAL PAGE -->
<div id="normal">
    <h1>Click the button to see something cool 😄</h1>
    <button onclick="scare()">Click Me</button>
</div>

<!-- SCARE PAGE -->
<div id="scare">
    <img src="https://i.imgur.com/3ZQ3ZQp.png">
    <h1>YOU’VE BEEN HACKED 😈</h1>
    <p>Just kidding… April Fools 😂</p>
</div>

<!-- SOUND -->
<audio id="sound" src="https://www.myinstants.com/media/sounds/scream.mp3"></audio>

<script>
function scare() {
    document.getElementById("normal").style.display = "none";
    let scare = document.getElementById("scare");
    scare.style.display = "flex";

    let sound = document.getElementById("sound");
    sound.play();
}
</script>

</body>
</html>
