<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Device Scan</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: #00ffcc;
    text-align: center;
    margin-top: 100px;
}

button {
    padding: 15px 30px;
    font-size: 18px;
    cursor: pointer;
}

#loading {
    display: none;
    margin-top: 30px;
}

#bar {
    width: 0%;
    height: 20px;
    background: #00ffcc;
}

#scare {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    color:red;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}
</style>
</head>

<body>

<h1>AI Security Scanner</h1>
<p>Check your device safety in seconds</p>

<button onclick="startScan()">Start Scan</button>

<div id="loading">
    <p id="text">Initializing...</p>
    <div style="width:300px; background:#333; margin:auto;">
        <div id="bar"></div>
    </div>
</div>

<div id="scare">
    <h1>WE FOUND YOU 👁️</h1>
    <p>Just kidding… April Fools 😂</p>
</div>

<audio id="sound" src="https://www.myinstants.com/media/sounds/scream.mp3"></audio>

<script>
function startScan() {
    document.querySelector("button").style.display = "none";
    document.getElementById("loading").style.display = "block";

    let bar = document.getElementById("bar");
    let text = document.getElementById("text");

    let progress = 0;

    let interval = setInterval(() => {
        progress += 10;
        bar.style.width = progress + "%";

        if(progress == 20) text.innerText = "Scanning files...";
        if(progress == 40) text.innerText = "Analyzing activity...";
        if(progress == 60) text.innerText = "Detecting location...";
        if(progress == 80) text.innerText = "Accessing camera...";

        if(progress >= 100){
            clearInterval(interval);
            scare();
        }
    }, 500);
}

function scare(){
    document.body.innerHTML = `
        <div style="background:black;color:red;height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;">
            <h1>YOU’RE NOT ALONE 😈</h1>
            <p>April Fools 😂</p>
        </div>
    `;
    document.getElementById("sound").play();
}
</script>

</body>
</html>
